<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 상세</title>

    <script src="config/config.js"></script>
    <script>
        loadCSS('css/common.css');
        loadCSS('css/components.css');
        loadCSS('css/detail.css');
        loadCSS('css/responsive.css');
        loadJS('js/feedback.js');
    </script>
</head>

<body>
<main class="container">

    <nav aria-label="탐색">
        <a href="list.html" class="back-button">&larr; 목록으로 돌아가기</a>
    </nav>

    <article class="detail-layout">

        <aside class="char-profile">
            <img id="char-image" src="https://via.placeholder.com/400x600?text=Loading..." alt="캐릭터 일러스트">
            <h2 id="char-name">...</h2>
            <div class="tags" id="char-tags"></div>
            <div class="lore">
                <h4>배경 스토리</h4>
                <p id="char-lore">...</p>
            </div>
            <h4>기본 스탯 (Lv.1)</h4>
            <div id="stats-table-container"></div>
        </div>

        <section class="char-data">

            <div class="data-tabs" id="data-tabs" role="tablist" aria-label="캐릭터 정보 탭">
                <button class="tab-link active" data-tab="tab-skills" role="tab" aria-selected="true" aria-controls="tab-skills">스킬</button>
                <button class="tab-link" data-tab="tab-covenant" role="tab" aria-selected="false" aria-controls="tab-covenant">비밀계약</button>
                <button class="tab-link" data-tab="tab-myeongryun" role="tab" aria-selected="false" aria-controls="tab-myeongryun">명륜</button>
                <button class="tab-link" data-tab="tab-team" role="tab" aria-selected="false" aria-controls="tab-team">조합</button>
                <button class="tab-link" data-tab="tab-growth" role="tab" aria-selected="false" aria-controls="tab-growth">영지 계발/특성</button>
            </div>

            <div class="tab-content active" id="tab-skills" role="tabpanel" aria-labelledby="tab-skills"></div>
            <div class="tab-content" id="tab-covenant" role="tabpanel" aria-labelledby="tab-covenant"></div>
            <div class="tab-content" id="tab-myeongryun" role="tabpanel" aria-labelledby="tab-myeongryun"></div>
            <div class="tab-content team-grid" id="tab-team" role="tabpanel" aria-labelledby="tab-team"></div>
            <div class="tab-content" id="tab-growth" role="tabpanel" aria-labelledby="tab-growth">
                <h4>영지 계발 (돌파)</h4>
                <div id="breakthrough-content"></div>
                <hr style="border-color: #555; margin: 25px 0;">
                <h4>특성</h4>
                <div id="talents-content"></div>
            </div>

        </section>
    </article>
</main>

<div class="modal-overlay" id="derived-modal" role="dialog" aria-modal="true" aria-labelledby="derived-modal-title">
    <div class="modal-content">
        <h3 id="derived-modal-title">파생 카드</h3>
        <div class="derived-carousel-container">
            <button class="modal-carousel-arrow left" id="modal-prev" aria-label="이전 카드">&lt;</button>
            <div class="derived-card-slide" id="modal-skill-slide">
            </div>
            <button class="modal-carousel-arrow right" id="modal-next" aria-label="다음 카드">&gt;</button>
        </div>
    </div>
</div>

<script src="config/constants.js"></script>
<script src="js/detail.js"></script>


<button class="floating-report-btn" title="버그 신고" aria-label="버그 제보하기">
    <span aria-hidden="true">🚨</span>
</button>
</body>
</html>
