<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>각성체 목록</title>

    <script src="config/config.js"></script>
    <script>
        loadCSS('css/common.css');
        loadCSS('css/components.css');
        loadCSS('css/pages/list.css');
        loadCSS('css/responsive.css');
        loadJS('js/feedback.js');
    </script>
</head>

<body>
<main class="container">

    <div class="header-area">
        <nav aria-label="탐색"><a href="index.html" class="back-link">⬅ 돌아가기</a></nav>
        <h1>각성체 목록</h1>
    </div>

    <section class="controls-container" aria-label="검색 및 필터">
        <input type="search" id="search-bar" class="search-bar" placeholder="캐릭터 이름 검색..." aria-label="캐릭터 이름 검색">
        <div class="filter-container">
            <select id="relems-filter" aria-label="계역 필터">
                <option value="all">계역 (전체)</option>
                <option value="chaos">혼돈</option>
                <option value="aequor">심해</option>
                <option value="caro">혈육</option>
                <option value="ultra">초차원</option>
            </select>
            <select id="grade-filter" aria-label="등급 필터">
                <option value="all">등급 (전체)</option>
                <option value="ssr">SSR</option>
                <option value="sr">SR</option>
            </select>
            <select id="class-filter" aria-label="클래스 필터">
                <option value="all">클래스 (전체)</option>
                <option value="assault">공격</option>
                <option value="warden">방어</option>
                <option value="chorus">보조</option>
            </select>
        </div>
    </section>

    <section class="character-grid" id="character-grid" aria-label="캐릭터 목록">
    </section>
</main>

<script src="config/constants.js"></script>
<script src="js/index.js"></script>


<button class="floating-report-btn" title="버그 신고" aria-label="버그 제보하기">
    <span aria-hidden="true">🚨</span>
</button>
</body>
</html>
