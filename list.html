<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <title>각성체 정보 | 미사그 대학 한국 캠퍼스</title>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">

    <link rel="stylesheet" href="css/common.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/components.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/pages/list.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/responsive.css?v=v1.4.0-site-quality-20260713-r4">
    <script defer src="config/config.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/search_utils.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/ui/dialog.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/feedback.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script type="module" defer src="js/index.js?v=v1.4.0-site-quality-20260713-r4"></script>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div class="bg-image"></div>
<div class="background-overlay"></div>

<main id="main-content" class="container list-page">
    <header class="list-header">
        <nav aria-label="현재 위치"><a href="index.html" class="back-link">홈</a></nav>
        <div>
            <p class="eyebrow">Awakener Archive</p>
            <h1>각성체 정보</h1>
            <p class="lede">이름·계역·등급·역할로 각성체를 찾고 추천 세팅과 관련 자료를 확인하세요.</p>
        </div>
    </header>

    <form class="controls-container list-controls surface" id="character-filters" role="search">
        <div class="control-field search-field">
            <label for="search-bar">각성체 이름</label>
            <input type="search" id="search-bar" class="search-bar"
                   placeholder="이름 또는 초성으로 검색" autocomplete="off"
                   aria-controls="character-grid" enterkeyhint="search">
        </div>
        <div class="filter-container">
            <div class="control-field">
                <label for="relems-filter">계역</label>
                <select id="relems-filter" aria-controls="character-grid">
                    <option value="all">전체 계역</option>
                    <option value="chaos">혼돈</option>
                    <option value="aequor">심해</option>
                    <option value="caro">혈육</option>
                    <option value="ultra">초차원</option>
                </select>
            </div>
            <div class="control-field">
                <label for="grade-filter">등급</label>
                <select id="grade-filter" aria-controls="character-grid">
                    <option value="all">전체 등급</option>
                    <option value="ssr">SSR</option>
                    <option value="sr">SR</option>
                </select>
            </div>
            <div class="control-field">
                <label for="class-filter">역할</label>
                <select id="class-filter" aria-controls="character-grid">
                    <option value="all">전체 역할</option>
                    <option value="assault">공격형</option>
                    <option value="warden">방어형</option>
                    <option value="chorus">보조형</option>
                </select>
            </div>
            <button type="reset" class="filter-reset">필터 초기화</button>
        </div>
    </form>

    <div class="list-summary">
        <p id="result-count" role="status" aria-live="polite">각성체 목록을 불러오는 중입니다.</p>
    </div>
    <section class="character-grid" id="character-grid" aria-label="각성체 목록" aria-busy="true"></section>
    <div id="character-empty" class="empty-state hidden">
        <strong>조건에 맞는 각성체가 없습니다.</strong>
        <span>검색어를 줄이거나 필터를 초기화해 보세요.</span>
    </div>
</main>

<button class="floating-report-btn" type="button" title="버그 신고" aria-label="버그 또는 개선 의견 제보">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 20h18.4ZM12 9v5M12 17.5h.01"/></svg>
</button>
</body>
</html>
