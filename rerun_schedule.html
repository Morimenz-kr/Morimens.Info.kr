<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <title>복각 일정 | 미사그 대학 한국 캠퍼스</title>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <link rel="stylesheet" href="css/common.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/components.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/pages/info_tools.css?v=v1.4.0-site-quality-20260713-r4">
    <script defer src="config/config.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/ui/dialog.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/feedback.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/rerun_schedule.js?v=v1.4.0-site-quality-20260713-r4"></script>
</head>
<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div class="bg-image"></div>
<div class="background-overlay"></div>
<main id="main-content" class="container info-page">
    <nav aria-label="현재 위치"><a href="index.html" class="back-link">홈</a></nav>
    <section class="info-shell">
        <header class="info-header">
            <div>
                <p class="info-eyebrow">도서관</p>
                <h1>복각 일정</h1>
                <p>현재 복각과 캐릭터별 마지막 복각 시점을 한눈에 확인하세요.</p>
            </div>
            <a class="primary-link" href="https://docs.google.com/spreadsheets/d/1gRDzdVHGfCC4qjt5aZYKuU9FWEfWdqREztNGeiczmRk/edit?gid=653016488#gid=653016488"
               target="_blank" rel="noopener noreferrer">전체 출시·복각표 열기 ↗</a>
        </header>
        <p id="schedule-updated" class="updated-at" aria-live="polite"></p>

        <section aria-labelledby="current-heading">
            <div class="section-heading">
                <div>
                    <h2 id="current-heading">현재 복각 중</h2>
                    <p>현재 배너에 포함된 캐릭터입니다.</p>
                </div>
            </div>
            <div id="current-schedules" class="character-card-grid" aria-live="polite"></div>
        </section>

        <section class="gap-section" aria-labelledby="gap-heading">
            <div class="section-heading">
                <div>
                    <h2 id="gap-heading">다음 복각 예상 순위</h2>
                    <p>마지막 등장 이후의 공백을 기준으로 정렬한 참고 정보이며, 복각을 확정하는 순위는 아닙니다.</p>
                </div>
            </div>
            <div id="rerun-gap-list" class="rerun-gap-list" aria-live="polite"></div>
        </section>

        <details class="history-disclosure">
            <summary>
                <span class="history-disclosure-title">출시·복각 기록</span>
                <span class="history-disclosure-hint">기록 펼치기 <span class="history-disclosure-arrow" aria-hidden="true">▶</span></span>
            </summary>
            <div id="rerun-history" class="history-list"></div>
        </details>
    </section>
</main>
<button class="floating-report-btn" type="button" title="버그 신고" aria-label="버그 또는 개선 의견 제보">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 20h18.4ZM12 9v5M12 17.5h.01"/></svg>
</button>
</body>
</html>
