<!doctype html>
<html lang="ko">

<head>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <title>각성체 · 명륜 보유 현황 | 미사그 대학 한국 캠퍼스</title>

    <link rel="stylesheet" href="css/common.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/components.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/pages/inventory_checker.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/responsive.css?v=v1.4.0-site-quality-20260713-r4">
    <script defer src="config/config.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/search_utils.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/ui/dialog.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/feedback.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script type="module" defer src="js/inventory_checker.js?v=v1.4.0-site-quality-20260713-r4"></script>
</head>

<body>
<a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
<div class="bg-image"></div>
<div class="background-overlay"></div>

<main id="main-content" class="container inventory-page">
    <div class="header-area">
        <nav aria-label="현재 위치"><a href="index.html" class="back-link">홈</a></nav>
        <h1>보유 현황</h1>
    </div>

    <section class="inventory-shell" aria-label="보유량 체크 도구">
        <div class="inventory-summary">
            <div>
                <p class="eyebrow">Collection Tracker</p>
                <h2>각성체 · 명륜 보유 현황</h2>
            </div>
            <div class="summary-counts" aria-live="polite">
                <span>각성체 <strong id="character-count">0</strong></span>
                <span>명륜 <strong id="wheel-count">0</strong></span>
            </div>
        </div>

        <section class="checker-panel" aria-label="보유 항목 선택">
            <div class="chrome-tabs-container checker-tabs" role="tablist" aria-label="체크 대상">
                <div class="tab-buttons">
                    <button type="button" id="characters-tab" class="chrome-tab active"
                            data-tab-button="characters" role="tab" aria-selected="true"
                            aria-controls="character-grid">각성체</button>
                    <button type="button" id="wheels-tab" class="chrome-tab"
                            data-tab-button="wheels" role="tab" aria-selected="false"
                            aria-controls="wheel-grid" tabindex="-1">명륜</button>
                </div>
                <div class="capture-actions">
                    <button type="button" id="copy-image-btn" class="primary-action">이미지 복사</button>
                    <button type="button" id="preview-image-btn" class="ghost-action">미리보기</button>
                    <button type="button" id="clear-selection-btn" class="ghost-action">전체 초기화</button>
                </div>
            </div>

            <div class="checker-controls">
                <div class="control-field">
                    <label for="inventory-search">이름 검색</label>
                    <input type="search" id="inventory-search" class="search-bar"
                           placeholder="이름 또는 초성으로 검색" autocomplete="off">
                </div>
                <div class="filter-row">
                    <div id="character-filters" class="filter-pills" role="group" aria-label="각성체 필터">
                        <button type="button" class="filter-pill active" data-character-filter="all" aria-pressed="true">전체</button>
                        <button type="button" class="filter-pill" data-character-filter="standard" aria-pressed="false">통상</button>
                        <button type="button" class="filter-pill" data-character-filter="forgotten" aria-pressed="false">망각편</button>
                        <button type="button" class="filter-pill" data-character-filter="celestial" aria-pressed="false">성신편</button>
                    </div>
                    <div id="character-class-filters" class="filter-pills" role="group" aria-label="각성체 역할 필터">
                        <button type="button" class="filter-pill active" data-character-class-filter="all" aria-pressed="true">전체 역할</button>
                        <button type="button" class="filter-pill" data-character-class-filter="assault" aria-pressed="false">공격형</button>
                        <button type="button" class="filter-pill" data-character-class-filter="warden" aria-pressed="false">방어형</button>
                        <button type="button" class="filter-pill" data-character-class-filter="chorus" aria-pressed="false">보조형</button>
                    </div>
                    <div id="wheel-filters" class="filter-pills hidden" role="group" aria-label="명륜 필터">
                        <button type="button" class="filter-pill active" data-wheel-filter="all" aria-pressed="true">전체</button>
                        <button type="button" class="filter-pill" data-wheel-filter="SSR" aria-pressed="false">SSR</button>
                        <button type="button" class="filter-pill" data-wheel-filter="SR" aria-pressed="false">SR</button>
                    </div>
                    <div class="bulk-actions" role="group" aria-label="일괄 선택">
                        <button type="button" id="select-visible-btn" class="ghost-action">모두 선택</button>
                        <button type="button" id="deselect-visible-btn" class="ghost-action">모두 해제</button>
                    </div>
                </div>
            </div>

            <div id="character-grid" class="inventory-grid character-inventory-grid"
                 role="tabpanel" aria-labelledby="characters-tab" aria-label="각성체 목록"></div>
            <div id="wheel-grid" class="inventory-grid wheel-inventory-grid hidden"
                 role="tabpanel" aria-labelledby="wheels-tab" aria-label="명륜 목록" hidden></div>
        </section>

        <section class="capture-panel" aria-label="공유용 결과">
            <div id="copy-status" class="copy-status" role="status" aria-live="polite"></div>
        </section>
    </section>
</main>

<div id="preview-modal" class="modal-overlay" role="dialog" aria-modal="true"
     aria-labelledby="preview-modal-title" aria-describedby="preview-modal-description">
    <div class="modal-content preview-modal-content" tabindex="-1">
        <div class="modal-header">
            <h2 id="preview-modal-title">공유 이미지 미리보기</h2>
            <button type="button" id="close-preview-modal" class="close-btn" data-dialog-close aria-label="미리보기 닫기">&times;</button>
        </div>
        <p id="preview-modal-description" class="muted-text">현재 필터에서 선택한 항목으로 생성한 공유 이미지입니다.</p>
        <div class="preview-image-frame">
            <img id="preview-image" alt="공유 이미지 미리보기">
        </div>
    </div>
</div>


<button class="floating-report-btn" type="button"
        title="버그 신고" aria-label="버그 또는 개선 의견 제보">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 20h18.4ZM12 9v5M12 17.5h.01"/></svg>
</button>

</body>
</html>
