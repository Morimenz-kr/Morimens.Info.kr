<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <title>융재금구 파티 시뮬레이터 | 미사그 대학 한국 캠퍼스</title>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <link rel="stylesheet" href="css/common.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/components.css?v=v1.4.0-site-quality-20260713-r4">
    <link rel="stylesheet" href="css/party_builder.css?v=v1.4.0-site-quality-20260713-r4">
    <script defer src="config/config.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/search_utils.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/ui/dialog.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script defer src="js/feedback.js?v=v1.4.0-site-quality-20260713-r4"></script>
    <script type="module" defer src="js/party_builder.js?v=v1.4.0-site-quality-20260713-r4"></script>
</head>
<body class="party-builder-page">

<a class="skip-link" href="#party-builder-content" inert aria-disabled="true">편성 영역으로 건너뛰기</a>

<section id="party-init-error" class="party-init-error" role="alert" hidden>
    <p id="party-init-error-message"></p>
    <button type="button" class="btn btn-yellow" id="party-init-retry">필수 데이터 다시 불러오기</button>
</section>

<main class="builder-container" id="party-builder-main" inert aria-busy="true">
    <aside class="sidebar" id="sidebar-tabs" aria-label="팀 선택" role="group"></aside>

    <section class="main-area" id="party-builder-content" aria-labelledby="team-title-text" tabindex="-1">
        <div class="top-navigation-bar">
            <div class="back-btn-wrapper">
                <a href="index.html" class="back-btn">← 홈으로 돌아가기</a>
            </div>

            <div class="page-control-bar">
                <div id="page-tabs" class="page-tabs" role="group" aria-label="파티 세트 선택 및 관리"></div>
                <button type="button" class="add-page-btn" id="add-page-btn" aria-label="새 세트 추가" title="새 세트 추가">+</button>
            </div>
        </div>

        <header class="header-wrapper">
            <div class="header-left">
                <h1 id="team-title-text">TEAM I</h1>
                <button type="button" class="icon-button edit-team-button" id="edit-team-name-btn" aria-label="현재 팀 이름 변경" title="팀 이름 변경">
                    <svg class="edit-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                        <path d="M3 17.25V21H6.75L17.81 9.94L14.06 6.19L3 17.25ZM20.71 7.04C21.1 6.65 21.1 6.02 20.71 5.63L18.37 3.29C17.98 2.9 17.35 2.9 16.96 3.29L15.13 5.12L18.88 8.87L20.71 7.04Z" />
                    </svg>
                </button>
                <div id="team-domain-container" class="header-domain-wrap" aria-live="polite"></div>
            </div>
            <div class="header-right">
                <button type="button" class="btn btn-blue btn-sm" id="copy-team-btn">팀 복사</button>
                <button type="button" class="btn btn-blue btn-sm" id="paste-team-btn">팀 붙여넣기</button>
                <button type="button" class="btn btn-red btn-sm" id="reset-team-btn">팀 초기화</button>
            </div>
        </header>
        <p id="party-save-error" class="party-save-error" role="alert" hidden></p>

        <div class="content-row">
            <div class="slots-container" id="team-slots" role="group" aria-label="현재 팀 편성"></div>
        </div>

        <footer class="bottom-section">
            <button type="button" class="silverkey-box" id="open-key-modal-btn" aria-label="은열쇠 선택">
                <span class="key-circle" id="key-icon" aria-hidden="true">+</span>
                <span class="key-info">
                    <span>은열쇠</span>
                    <span id="key-name">장착 안 함</span>
                </span>
            </button>
            <div class="btn-group">
                <button type="button" class="btn btn-blue" id="quick-setup-btn">빠른 편성</button>
                <button type="button" class="btn btn-yellow" id="save-party-btn">저장</button>
            </div>
        </footer>
    </section>
</main>

<div id="modal-char" class="modal-overlay" hidden>
    <section class="modal-box" role="dialog" aria-modal="true" aria-labelledby="char-modal-title" tabindex="-1">
        <header class="modal-header">
            <h2 id="char-modal-title">배치할 각성체 선택 (최대 4명)</h2>
            <button type="button" class="close-btn" data-close-modal="modal-char" aria-label="각성체 선택 닫기">&times;</button>
        </header>
        <div class="char-search-section">
            <div class="search-container">
                <div class="search-input-box">
                    <label class="sr-only" for="char-search-input">각성체 이름 또는 특성 검색</label>
                    <div class="search-input-wrapper">
                        <svg class="search-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="search" id="char-search-input" placeholder="이름 또는 특성 검색 (예: 중독, 크리티컬)" autocomplete="off" aria-controls="char-search-suggestions grid-char">
                    </div>
                    <div id="char-search-suggestions" class="suggestions-dropdown" role="group" aria-label="검색 특성 추천"></div>
                    <p id="char-search-status" class="sr-only" role="status" aria-live="polite"></p>
                </div>
            </div>
            <div class="char-filter-container">
                <div class="filter-group" role="group" aria-labelledby="domain-filter-label">
                    <span class="filter-label" id="domain-filter-label">계역</span>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="chaos" aria-pressed="false">혼돈</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="aequor" aria-pressed="false">심해</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="caro" aria-pressed="false">혈육</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="ultra" aria-pressed="false">초차원</button>
                </div>
                <div class="filter-group filter-group-separated" role="group" aria-labelledby="class-filter-label">
                    <span class="filter-label" id="class-filter-label">역할</span>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="assault" aria-pressed="false">공격형</button>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="warden" aria-pressed="false">방어형</button>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="chorus" aria-pressed="false">보조형</button>
                </div>
                <button type="button" id="owned-char-toggle" class="owned-only-toggle" role="switch" aria-checked="false">보유만 보기</button>
            </div>
            <div id="active-char-search-tags" class="active-tags-list" role="group" aria-label="적용 중인 특성 필터"></div>
        </div>
        <div class="modal-grid" id="grid-char" role="group" aria-label="각성체 목록"></div>
        <footer class="modal-footer">
            <output id="char-count" aria-live="polite">0 / 4 선택됨</output>
            <div class="modal-footer-actions">
                <button type="button" id="btn-remove-support" class="btn btn-red" hidden>조력자 해제</button>
                <button type="button" class="btn btn-yellow" id="confirm-quick-setup-btn">배치 확정</button>
            </div>
        </footer>
    </section>
</div>

<div id="modal-wheel" class="modal-overlay" hidden>
    <section class="modal-box-wide" role="dialog" aria-modal="true" aria-labelledby="wheel-modal-title" tabindex="-1">
        <h2 id="wheel-modal-title" class="sr-only">명륜 선택</h2>
        <button type="button" class="close-btn modal-corner-close" data-close-modal="modal-wheel" aria-label="명륜 선택 닫기">&times;</button>

        <div class="wheel-list-wrapper">
            <div class="search-container">
                <label class="sr-only" for="wheel-search-input">명륜 검색</label>
                <div class="search-input-wrapper">
                    <svg class="search-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="search" id="wheel-search-input" placeholder="명륜 검색" autocomplete="off" aria-controls="grid-wheel">
                </div>
                <div id="wheel-main-stat-filters" class="wheel-main-stat-filters" role="group" aria-label="명륜 주옵션 필터"></div>
                <button type="button" id="owned-wheel-toggle" class="owned-only-toggle" role="switch" aria-checked="false">보유만 보기</button>
            </div>
            <div class="wheel-list-panel" id="grid-wheel" role="group" aria-label="명륜 목록"></div>
        </div>

        <div class="wheel-equip-panel">
            <h3>장착 슬롯 선택</h3>
            <div class="wheel-equip-slots" role="group" aria-label="명륜 장착 슬롯">
                <button type="button" class="large-slot" id="equip-slot-0" data-wheel-slot="0" aria-pressed="true" aria-label="첫 번째 명륜 슬롯"><span class="slot-placeholder">+</span></button>
                <button type="button" class="large-slot" id="equip-slot-1" data-wheel-slot="1" aria-pressed="false" aria-label="두 번째 명륜 슬롯"><span class="slot-placeholder">+</span></button>
            </div>
            <p class="equip-info-text" id="equip-slot-desc" aria-live="polite">슬롯을 선택하세요</p>

            <div class="action-buttons-container" id="modal-action-buttons">
                <button type="button" class="btn btn-modal btn-equip-ssr" id="btn-equip-ssr" hidden>전용 SSR 장착</button>
                <button type="button" class="btn btn-modal btn-equip-sr" id="btn-equip-sr" hidden>전용 SR 장착</button>
                <button type="button" class="btn btn-modal btn-red" id="unequip-wheel-btn">해제</button>
            </div>
        </div>
    </section>
</div>

<div id="modal-key" class="modal-overlay" hidden>
    <section class="modal-box modal-box-key" role="dialog" aria-modal="true" aria-labelledby="key-modal-title" tabindex="-1">
        <header class="modal-header">
            <h2 id="key-modal-title">은열쇠 선택</h2>
            <button type="button" class="close-btn" data-close-modal="modal-key" aria-label="은열쇠 선택 닫기">&times;</button>
        </header>

        <div class="search-container key-search-controls">
            <div class="search-input-box">
                <label class="sr-only" for="key-search-input">은열쇠 검색</label>
                <div class="search-input-wrapper">
                    <svg class="search-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="search" id="key-search-input" placeholder="은열쇠 검색" autocomplete="off" aria-controls="grid-key">
                </div>
            </div>
            <div class="key-sort-control">
                <label for="key-sort-select">정렬</label>
                <select id="key-sort-select">
                    <option value="recent">최근 사용순</option>
                    <option value="default">기본 정렬</option>
                </select>
            </div>
        </div>

        <div class="modal-grid" id="grid-key" role="group" aria-label="은열쇠 목록"></div>

        <div class="action-buttons-container key-actions">
            <button type="button" class="btn-modal" id="btn-equip-key" hidden>전용 은열쇠 장착</button>
            <button type="button" class="btn-modal" id="unequip-key-btn">해제</button>
        </div>
    </section>
</div>

<div id="modal-system" class="modal-overlay" hidden data-static-backdrop="true">
    <section class="modal-box modal-box-system" role="alertdialog" aria-modal="true" aria-labelledby="sys-modal-title" aria-describedby="sys-modal-msg" tabindex="-1">
        <header class="modal-header">
            <h2 id="sys-modal-title">알림</h2>
            <button type="button" class="close-btn" data-close-modal="modal-system" aria-label="알림 닫기">&times;</button>
        </header>
        <p id="sys-modal-msg">내용</p>

        <div id="sys-input-wrapper" hidden>
            <label for="sys-modal-input">이름</label>
            <input type="text" id="sys-modal-input" class="form-input" maxlength="15" aria-describedby="sys-modal-char-count">
            <div id="sys-modal-char-count">0 / 15</div>
        </div>

        <footer class="modal-footer system-modal-actions">
            <button type="button" id="sys-btn-yes" class="btn btn-yellow">확인</button>
            <button type="button" id="sys-btn-no" class="btn btn-red" hidden>취소</button>
        </footer>
    </section>
</div>

<div id="global-tooltip" class="item-tooltip" role="tooltip" aria-hidden="true">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-desc" id="tt-desc"></div>
    <div class="tooltip-tags" id="tt-tags"></div>
</div>
<p id="party-tooltip-instructions" class="sr-only">장비 상세 설명은 길게 누르거나 Alt+아래쪽 화살표 키로 고정한 뒤 스크롤할 수 있습니다. Escape 키를 누르면 원래 항목으로 돌아갑니다.</p>

<div id="party-live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<button type="button" class="floating-report-btn" title="버그 제보" aria-label="버그 또는 개선 의견 제보" inert aria-disabled="true">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 20h18.4ZM12 9v5M12 17.5h.01"/></svg>
</button>
</body>
</html>
