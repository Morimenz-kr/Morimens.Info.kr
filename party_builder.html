<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="config/config.js?v=party-builder-20260709"></script>
    <script>
        loadCSS('css/common.css');
        loadCSS('css/components.css');
        loadCSS('css/party_builder.css?v=party-builder-20260723-17');
        loadJS('js/search_utils.js');
        loadJS('js/feedback.js');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>융재금지구역 파티 시뮬레이터</title>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
</head>
<body>

<div class="builder-container">
    <div class="sidebar" id="sidebar-tabs"></div>

    <div class="main-area">
        <div class="top-navigation-bar">
            <div class="back-btn-wrapper">
                <a href="javascript:void(0);" onclick="goBackToMenu()" class="back-btn">⬅ 홈으로 돌아가기</a>
            </div>

            <div class="page-control-bar">
                <div id="page-tabs" class="page-tabs"></div>
                <button class="add-page-btn" onclick="addNewPage()" title="새 세트 추가">+</button>
            </div>
        </div>

        <div class="header-wrapper">
            <div class="header-left">
                <h2 id="team-title-text">TEAM I</h2>
                <svg class="edit-icon" onclick="editTeamName()" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 17.25V21H6.75L17.81 9.94L14.06 6.19L3 17.25ZM20.71 7.04C21.1 6.65 21.1 6.02 20.71 5.63L18.37 3.29C17.98 2.9 17.35 2.9 16.96 3.29L15.13 5.12L18.88 8.87L20.71 7.04Z" />
                </svg>
                <div id="team-domain-container" class="header-domain-wrap"></div>
            </div>
            <div class="header-right" style="display: flex; gap: 8px;">
                <button class="btn btn-blue btn-sm" onclick="copyTeamToClipboard()">팀 복사</button>
                <button class="btn btn-blue btn-sm" onclick="pasteTeamFromClipboard()">팀 붙여넣기</button>
                <button class="btn btn-red btn-sm" onclick="resetCurrentTeam()">팀 초기화</button>
            </div>
        </div>

        <div class="content-row">
            <div class="slots-container" id="team-slots"></div>
        </div>

        <div class="bottom-section">
            <div class="silverkey-box" onclick="openKeyModal()">
                <div class="key-circle" id="key-icon">+</div>
                <div class="key-info">
                    <div>은열쇠</div>
                    <div id="key-name">장착 안 함</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-blue" onclick="openQuickSetup()">빠른 편성</button>
                <button class="btn btn-yellow" onclick="saveAllData()">저장</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-char" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3>배치할 각성체 선택 (최대 4명)</h3>
            <button class="close-btn" onclick="closeModal('modal-char')">&times;</button>
        </div>
        <div class="char-search-section">
            <div class="search-container">
                <div class="char-search-row">
                <div class="search-input-box">
                    <div class="search-input-wrapper">
                        <svg class="search-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="char-search-input" placeholder="이름 또는 특성 검색 (예: 죽저, 크리티컬)..." autocomplete="off">
                    </div>
                    <div id="char-search-suggestions" class="suggestions-dropdown"></div>
                </div>
                <div class="owned-toggle-control">
                    <button type="button" id="owned-char-toggle" class="owned-only-toggle" role="switch"
                            aria-checked="false" aria-describedby="owned-char-tooltip"
                            onclick="toggleOwnedOnly('characters')">
                        보유한 각성체만 보기
                    </button>
                    <span id="owned-char-tooltip" class="owned-toggle-tooltip" role="tooltip">
                        보유 현황 체크에서 선택한 각성체만 표시합니다.
                    </span>
                </div>
                </div>
            </div>
            <div class="char-filter-container">
                <div class="filter-group">
                    <span class="filter-label">영역:</span>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="chaos"
                            aria-pressed="false" onclick="toggleCharFilter('domain', 'chaos')">혼돈</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="aequor"
                            aria-pressed="false" onclick="toggleCharFilter('domain', 'aequor')">심해</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="caro"
                            aria-pressed="false" onclick="toggleCharFilter('domain', 'caro')">혈육</button>
                    <button type="button" class="filter-chip" data-filter-type="domain" data-filter-value="ultra"
                            aria-pressed="false" onclick="toggleCharFilter('domain', 'ultra')">초차원</button>
                </div>
                <div class="filter-group" style="border-left:1px solid #444; padding-left:20px;">
                    <span class="filter-label">역할:</span>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="assault"
                            aria-pressed="false" onclick="toggleCharFilter('class', 'assault')">공격형</button>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="warden"
                            aria-pressed="false" onclick="toggleCharFilter('class', 'warden')">방어형</button>
                    <button type="button" class="filter-chip" data-filter-type="class" data-filter-value="chorus"
                            aria-pressed="false" onclick="toggleCharFilter('class', 'chorus')">보조형</button>
                </div>
            </div>
            <div id="active-char-search-tags" class="active-tags-list"></div>
        </div>
        <div class="modal-grid" id="grid-char"></div>
        <div class="modal-footer">
            <span id="char-count" style="color:#aaa; margin-right:15px; font-size:0.9em;">0 / 4 선택됨</span>
            <div style="display: inline-flex; gap: 10px;">
                <button id="btn-remove-support" class="btn btn-red" onclick="removeSupport()" style="display: none;">조력자 해제</button>
                <button class="btn btn-yellow" onclick="confirmQuickSetup()">배치 확정</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-wheel" class="modal-overlay">
    <div class="modal-box-wide" style="position: relative;">

        <button class="close-btn" onclick="closeModal('modal-wheel')" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; color: #aaa; cursor: pointer; z-index: 10;">&times;</button>

        <div class="wheel-list-wrapper">
            <div class="search-container">
                <div class="wheel-search-row">
                    <input type="text" id="wheel-search-input" placeholder="명륜 검색..." autocomplete="off">
                    <div class="wheel-owned-controls">
                        <div class="owned-toggle-control">
                            <button type="button" id="owned-wheel-toggle" class="owned-only-toggle" role="switch"
                                    aria-checked="false" aria-describedby="owned-wheel-tooltip"
                                    onclick="toggleOwnedOnly('wheels')">
                                보유한 명륜만 보기
                            </button>
                            <span id="owned-wheel-tooltip" class="owned-toggle-tooltip" role="tooltip">
                                보유 현황 체크에 등록한 명륜만 표시합니다. 같은 각성체에 풀돌이 아닌 SSR 명륜이 장착되어 있으면, 다른 명륜 슬롯에는 SSR 명륜을 장착할 수 없습니다.
                            </span>
                        </div>
                    </div>
                </div>
                <div id="wheel-main-stat-filters" class="wheel-main-stat-filters" aria-label="명륜 주옵 필터"></div>
            </div>
            <div class="wheel-list-panel" id="grid-wheel"></div>
        </div>

        <div class="wheel-equip-panel">
            <h3 style="color:#eee; margin-bottom:50px;">장착 슬롯 선택</h3>
            <div class="wheel-equip-slots">
                <div class="large-slot" id="equip-slot-0" onclick="selectWheelSlot(0)"><div class="slot-placeholder">+</div></div>
                <div class="large-slot" id="equip-slot-1" onclick="selectWheelSlot(1)"><div class="slot-placeholder">+</div></div>
            </div>
            <div class="equip-info-text" id="equip-slot-desc" style="color:#777; margin-bottom:20px; text-align:center; min-height:40px;">슬롯을 선택하세요.</div>

            <div class="action-buttons-container" id="modal-action-buttons">
                <button class="btn btn-modal btn-equip-ssr" id="btn-equip-ssr" style="display: none;">전용 SSR 장착</button>
                <button class="btn btn-modal btn-equip-sr" id="btn-equip-sr" style="display: none;">전용 SR 장착</button>

                <button class="btn btn-modal btn-red" onclick="unequipSelectedWheel()" style="grid-column: span 2;">해제</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-key" class="modal-overlay">
    <div class="modal-box" style="max-width:600px; height:80vh;">
        <div class="modal-header">
            <h3>은열쇠 선택</h3>
            <button class="close-btn" onclick="closeModal('modal-key')">&times;</button>
        </div>

        <div class="search-container" style="flex-direction: row; align-items: center;">
            <div class="search-input-box" style="flex: 1;">
                <div class="search-input-wrapper">
                    <svg class="search-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="key-search-input" placeholder="은열쇠 검색..." autocomplete="off">
                </div>
            </div>
            <select id="key-sort-select" onchange="renderKeyGrid()" style="padding: 12px; background: #1e1e22; border: 1px solid #555; color: #eee; border-radius: 4px; outline: none; cursor: pointer; font-size: 0.9em; font-family: 'Pretendard', sans-serif;">
                <option value="recent">최근 사용순</option>
                <option value="default">기본 정렬</option>
            </select>
        </div>

        <div class="modal-grid" id="grid-key"></div>

        <div class="action-buttons-container" style="margin-top: 15px; margin-bottom: 5px;">
            <button class="btn-modal" id="btn-equip-key" style="display: none; background-color: #333; color: #ccc; border: 1px solid #555;">전용 은열쇠 장착</button>
            <button class="btn-modal" onclick="unequipKey()" style="background-color: #333; color: #ccc; border: 1px solid #555;">해제</button>
        </div>
    </div>
</div>

<div id="modal-system" class="modal-overlay">
    <div class="modal-box" style="max-width: 450px; height: auto; min-height: 200px; border-color: #777;">
        <div class="modal-header">
            <h3 id="sys-modal-title" style="color: var(--highlight);">알림</h3>
            <button class="close-btn" onclick="closeModal('modal-system')">&times;</button>
        </div>
        <div id="sys-modal-msg" style="padding: 30px 30px 10px 30px; text-align: center; color: #e0e0e0; font-size: 1.1em; line-height: 1.5; white-space: pre-line;">내용</div>

        <div id="sys-input-wrapper" style="padding: 0 40px 20px 40px; display: none;">
            <input type="text" id="sys-modal-input" class="form-input"
                   style="width: 100%; text-align: center; background:#333; border:1px solid #555; color:#fff; padding:10px; border-radius:4px;">
            <div id="sys-modal-char-count" style="text-align: right; color: #888; font-size: 0.8em; margin-top: 5px;">0 / 15</div>
        </div>

        <div class="modal-footer" style="justify-content: center; gap: 15px; padding-bottom: 25px;">
            <button id="sys-btn-yes" class="btn btn-yellow" style="min-width: 80px;">확인</button>
            <button id="sys-btn-no" class="btn btn-red" style="min-width: 80px; display: none;">취소</button>
        </div>
    </div>
</div>


<div id="global-tooltip" class="item-tooltip">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-desc" id="tt-desc"></div>
    <div class="tooltip-tags" id="tt-tags"></div>
</div>

<button class="floating-report-btn" title="버그 신고">🚨</button>

<script src="js/party_builder.js?v=party-builder-20260723-21"></script>
</body>
</html>
