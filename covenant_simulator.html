<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀계약 시뮬레이터</title>

    <script src="config/config.js?v=covenant-simulator-20260613"></script>
    <script>
        CONFIG.VERSION = 'covenant-simulator-20260617-5';
        loadCSS('css/common.css');
        loadCSS('css/components.css');
        loadCSS('css/pages/covenant_simulator.css');
        loadCSS('css/responsive.css');
        loadJS('js/feedback.js');
    </script>
</head>

<body>
<div class="bg-image"></div>
<div class="background-overlay"></div>

<main class="container covenant-page">
    <div class="header-area">
        <nav aria-label="탐색"><a href="index.html" class="back-link">← 돌아가기</a></nav>
    </div>

    <section class="covenant-shell" aria-label="비밀계약 시뮬레이터">
        <div class="covenant-summary">
            <h2>비밀계약 시뮬레이터</h2>
        </div>

        <section class="simulator-panel" aria-label="비밀계약 선택">
            <div class="section-heading">
                <h3>비밀계약 선택</h3>
                <span id="selected-contract-name" class="muted-text"></span>
            </div>
            <div id="contract-grid" class="contract-grid" aria-label="비밀계약 목록"></div>
        </section>

        <section class="simulator-panel" aria-label="시뮬레이션 모드">
            <div class="chrome-tabs-container simulator-tabs" role="tablist" aria-label="시뮬레이션 모드">
                <div class="tab-buttons">
                    <button type="button" class="chrome-tab active" data-mode-tab="manual" role="tab" aria-selected="true">직접 시뮬레이션</button>
                    <button type="button" class="chrome-tab" data-mode-tab="target" role="tab" aria-selected="false">목표 시뮬레이션</button>
                </div>
                <div class="capture-actions">
                    <div class="preset-controls" aria-label="프리셋 관리">
                        <input type="text" id="preset-name-input" class="preset-name-input" placeholder="프리셋 이름">
                        <select id="preset-select" class="sim-select preset-select" aria-label="저장된 프리셋"></select>
                        <button type="button" id="save-preset-btn" class="ghost-action">프리셋 저장</button>
                        <button type="button" id="load-preset-btn" class="ghost-action">불러오기</button>
                        <button type="button" id="delete-preset-btn" class="ghost-action">삭제</button>
                    </div>
                    <button type="button" id="reset-sim-btn" class="ghost-action">초기화</button>
                </div>
            </div>

            <div id="manual-panel" class="mode-panel">
                <div class="ingame-layout">
                    <section class="ingame-focus-panel" aria-label="선택한 비밀계약">
                        <div class="side-part-grid left-parts" id="left-part-grid" role="tablist" aria-label="왼쪽 파츠 선택"></div>
                        <div class="focus-image-frame">
                            <img id="manual-focus-image" src="" alt="">
                            <div class="focus-part-name" id="manual-focus-name">비밀계약 Ⅰ</div>
                            <div class="focus-total-completion" id="manual-total-completion">전체 완성도 0%</div>
                        </div>
                        <div class="side-part-grid right-parts" id="right-part-grid" role="tablist" aria-label="오른쪽 파츠 선택"></div>
                    </section>

                    <section class="config-card compact-card ingame-detail-panel" aria-label="현재 파츠 설정">
                        <div class="section-heading">
                            <h3 id="manual-part-title">비밀계약 1</h3>
                        </div>
                        <div class="manual-controls">
                            <div class="manual-main-field">
                                <label class="field-label" for="manual-main-option">주옵</label>
                                <div class="main-option-controls">
                                    <select id="manual-main-option" class="sim-select"></select>
                                    <select id="manual-main-level" class="sim-select"></select>
                                </div>
                            </div>
                            <div>
                                <div class="section-heading">
                                    <h3>전사</h3>
                                    <span id="manual-cost" class="muted-text"></span>
                                </div>
                                <div class="lock-cost-row">
                                    <label class="radio-option">
                                        <input type="radio" name="manual-lock-cost" value="fragment" checked>
                                        잔본 우선
                                    </label>
                                    <label class="radio-option">
                                        <input type="radio" name="manual-lock-cost" value="quill">
                                        깃펜 우선
                                    </label>
                                </div>
                                <div class="reroll-completion-row" aria-live="polite">
                                    <div class="completion-panel">
                                        <span class="completion-label">전사 전</span>
                                        <strong id="manual-before-completion">0%</strong>
                                    </div>
                                    <div class="completion-panel">
                                        <span class="completion-label">전사 후</span>
                                        <strong id="manual-after-completion">-</strong>
                                    </div>
                                </div>
                                <div class="reroll-compare">
                                    <div class="compare-column">
                                        <div id="manual-current-result" class="result-list"></div>
                                    </div>
                                    <div class="compare-column">
                                        <div id="manual-result" class="result-list empty-result">전사 결과가 여기에 표시됩니다.</div>
                                    </div>
                                </div>
                                <div class="action-row">
                                    <span id="manual-status" class="manual-status" role="status" aria-live="polite"></span>
                                    <button type="button" id="manual-reroll-btn" class="primary-action">전사</button>
                                    <button type="button" id="manual-apply-btn" class="ghost-action" disabled>교체</button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div id="target-panel" class="mode-panel hidden">
                <div class="target-toolbar">
                    <div class="contract-picker target-scope-picker">
                        <label class="field-label">대상 파츠</label>
                        <div id="target-scope-buttons" class="target-scope-buttons" aria-label="대상 파츠 선택"></div>
                    </div>
                    <div class="contract-picker">
                        <label class="field-label" for="target-lock-cost">잠금 1개 비용</label>
                        <select id="target-lock-cost" class="sim-select">
                            <option value="fragment" selected>잔본 우선</option>
                            <option value="quill">깃펜 우선</option>
                        </select>
                    </div>
                </div>

                <div class="target-preset-bar" aria-label="목표 프리셋 관리">
                    <div class="target-preset-heading">
                        <span class="target-preset-title">목표 프리셋</span>
                        <span class="target-preset-desc">대상 파츠와 목표 조건만 저장합니다.</span>
                    </div>
                    <div class="target-preset-controls">
                        <input type="text" id="target-preset-name-input" class="preset-name-input" placeholder="목표 프리셋 이름">
                        <select id="target-preset-select" class="sim-select preset-select" aria-label="저장된 목표 프리셋"></select>
                        <button type="button" id="save-target-preset-btn" class="ghost-action">저장</button>
                        <button type="button" id="load-target-preset-btn" class="ghost-action">불러오기</button>
                        <button type="button" id="delete-target-preset-btn" class="ghost-action">삭제</button>
                    </div>
                </div>

                <details class="target-fold-section" open>
                    <summary class="target-fold-summary">
                        <span>현재 세팅</span>
                        <small>목표 계산을 시작할 현재 부옵 상태입니다.</small>
                    </summary>
                    <div id="target-current-parts" class="target-parts"></div>
                </details>

                <details class="target-fold-section" open>
                    <summary class="target-fold-summary">
                        <span>목표 세팅</span>
                        <small>달성할 목표 옵션과 레벨을 설정합니다.</small>
                    </summary>
                    <div id="target-parts" class="target-parts"></div>
                </details>

                <div class="target-actions">
                    <button type="button" id="run-target-btn" class="primary-action">목표까지 시뮬레이션</button>
                </div>
            </div>
        </section>

        <section class="capture-panel" aria-label="시뮬레이션 결과">
            <div class="result-summary-card">
                <div class="section-heading">
                    <h3>결과</h3>
                    <span id="result-status" class="result-status" role="status" aria-live="polite"></span>
                </div>
                <div id="result-summary" class="summary-output"></div>
            </div>
        </section>
    </section>
</main>

<div id="contract-change-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="contract-change-title">
    <div class="modal-content contract-change-content">
        <h2 id="contract-change-title" class="form-title">비밀계약 변경</h2>
        <p class="contract-change-message">
            현재 세팅이 프리셋으로 저장되지 않았습니다. 저장하지 않고 비밀계약을 변경할까요?
        </p>
        <div class="contract-change-actions">
            <button type="button" id="cancel-contract-change-btn" class="ghost-action">취소</button>
            <button type="button" id="confirm-contract-change-btn" class="primary-action">변경하기</button>
        </div>
    </div>
</div>


<button class="floating-report-btn" title="버그 신고" aria-label="버그 제보하기">
    <span aria-hidden="true">🚨</span>
</button>

<script>
    loadJS('js/covenant_simulator.js');
</script>
</body>
</html>
