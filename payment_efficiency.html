<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">

    <title>과금효율표</title>
    <link rel="icon" type="image/webp" href="images/smile_Ramona.webp">
    <script src="config/config.js"></script>
    <script>
        loadCSS('css/common.css');
        loadCSS('css/components.css');
        loadCSS('css/pages/info_tools.css');
        loadJS('js/feedback.js');
    </script>
</head>
<body>
<div class="bg-image"></div>
<div class="background-overlay"></div>
<main class="container info-page">
    <nav aria-label="탐색"><a href="index.html" class="back-link">← 돌아가기</a></nav>
    <section class="info-shell">
        <header class="info-header">
            <div>
                <p class="info-eyebrow">도서관</p>
                <h1>과금효율표</h1>
                <p>이미지를 확대해 패키지별 효율을 비교할 수 있습니다.</p>

            <a class="primary-link" href="https://arca.live/b/forgettingeve/171274024"

        <div class="viewer-toolbar" aria-label="이미지 확대 도구">
            <button type="button" id="zoom-out" aria-label="축소">−</button>
            <output id="zoom-level" aria-live="polite">100%</output>

<button class="floating-report-btn" title="버그 신고" aria-label="버그 제보하기"><span aria-hidden="true">🚨</span></button>
